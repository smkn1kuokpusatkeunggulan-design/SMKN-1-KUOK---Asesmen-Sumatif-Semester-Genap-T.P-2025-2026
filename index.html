<!-- FILE: index.html -->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBT SMKN 1 KUOK</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background:#eef2f7;
      font-family:Arial;
    }

    .login-box{
      max-width:400px;
      margin:auto;
      margin-top:100px;
    }

    .card{
      border:none;
      border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .title{
      font-weight:bold;
      color:#0d6efd;
    }
  </style>
</head>
<body>

<div class="login-box">

  <div class="card p-4">

    <h3 class="text-center title">
      CBT SMKN 1 KUOK
    </h3>

    <hr>

    <input type="text"
           id="nisn"
           class="form-control mb-3"
           placeholder="NISN">

    <input type="password"
           id="password"
           class="form-control mb-3"
           placeholder="Password">

    <button class="btn btn-primary w-100"
            onclick="login()">
      LOGIN
    </button>

  </div>

</div>

<script>

const API =
"https://script.google.com/macros/s/ISI_WEBAPP_ANDA/exec";

async function login(){

  const nisn =
  document.getElementById("nisn").value;

  const password =
  document.getElementById("password").value;

  const url =
  `${API}?action=login&nisn=${nisn}&password=${password}`;

  const res = await fetch(url);

  const data = await res.json();

  if(data.status){

    localStorage.setItem(
      "user",
      JSON.stringify(data)
    );

    window.location="ujian.html";

  }else{

    alert("Login gagal");
  }
}

</script>

</body>
</html>
