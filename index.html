function login(){

  const username =
    document.getElementById("username").value;

  const password =
    document.getElementById("password").value;

  google.script.run
  .withSuccessHandler(function(res){

    if(res.status){

      if(res.role == "admin"){
        window.location.href="?page=admin";
      }

      if(res.role == "peserta"){
        alert("Login Peserta Berhasil");
      }

      if(res.role == "pengawas"){
        alert("Login Pengawas Berhasil");
      }

    }else{
      alert("Login gagal");
    }

  })
  .login(username,password);

}

</script><script>

<script>

let time = 3600;

setInterval(function(){

  let menit = Math.floor(time/60);
  let detik = time%60;

  document.getElementById("timer")
  .innerHTML =
  menit + ":" + detik;

  time--;

  if(time <= 0){

    alert("Waktu habis");

  }

},1000);
